<!DOCTYPE html><html><head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <title>Slidysim Tier Ranks</title>
        <link rel="icon" type="image/png" href="images/egg.png">
        <link rel="stylesheet" href="power/css/style.css">
    </head>

    <body>
        <div class="page-header">
            <button class="date-button" id="date-button">Power Rankings</button>
            <button id="mobile-switch-btn" class="mobile-switch-btn">☰</button>
            <div id="switch-dropdown" class="header-right">
                <label class="custom-checkbox-countries" data-tt="Off: All players are shown&#10;On: Group players by their worst category tier">
                    <input type="checkbox" id="switch-true">
                    <span class="checkbox-text">True Tiers</span>
                </label>
                <label class="custom-checkbox-countries" data-tt="Off: All groups are shown&#10;On: Empty groups are hidden&#10;Do not use with category-specific graphs">
                    <input type="checkbox" id="switch-empty">
                    <span class="checkbox-text">Hide Empty</span>
                </label>
                <label class="custom-checkbox-countries" data-tt="Off: All Requirements are shown&#10;On: Only Leaderboard is shown">
                    <input type="checkbox" id="switch-reqs">
                    <span class="checkbox-text">Hide Reqs</span>
                </label>
                <label class="custom-checkbox-countries" id="switch-div-simplified" style="display:none" data-tt="Off: All sub-tiers are shown separately&#10;On: Sub-tiers are grouped into a single tier">
                    <input type="checkbox" id="switch-simplified">
                    <span class="checkbox-text">Group Tiers</span>
                </label>
                <label class="custom-checkbox-countries" data-tt="Off: All categories are included&#10;On: Categories that are impossible in LM are removed,&#10;excluded from true rank calculations,&#10;and FMC receives a 2x power bonus">
                    <input type="checkbox" id="switch-nerf">
                    <span class="checkbox-text">Nerf Slidysim</span>
                </label>
                <label class="custom-checkbox-countries" data-tt="Off: All colors are shown&#10;On: Only tier's color and above are shown">
                    <input type="checkbox" id="switch">
                    <span class="checkbox-text">Color Best</span>
                </label>
            </div>
        </div>

        <div id="chart-container" style="display:none; background:#1a1a1a; border-bottom:1px solid #333; height:440px; width:100%; overflow:clip; box-sizing:border-box; margin-top:60px; position:relative;">
            <div style="position:absolute; top:6px; left:10px; right:10px; z-index:1; display:flex; align-items:center; color:#999; font-size:11px;">
                <div style="flex:1;"></div>
                <span id="chart-title" style="color:#aaa; font-size:12px; font-weight:bold; text-align:center; word-break:break-word; line-height:1.3; max-width:50%;"></span>
                <div style="flex:1; display:flex; align-items:center; gap:8px; justify-content:flex-end;">
                    <span>Skip</span>
                    <input type="range" id="chart-ignore" value="0" min="0" style="width:100px; height:14px; vertical-align:middle; accent-color:#666; margin:0; cursor:pointer;">
                    <span id="chart-ignore-val">0</span>
                    <div id="chart-category-wrap" style="position:relative; display:inline-block;">
                        <span id="chart-category-trigger" style="cursor:pointer; color:#999; font-size:11px; user-select:none;">Overall ▾</span>
                        <div id="chart-category-panel" style="display:none; position:absolute; top:100%; right:0; background:#2a2a2a; border:1px solid #444; max-height:200px; overflow-y:auto; z-index:10; padding:4px 0; min-width:150px; white-space:nowrap;"></div>
                    </div>
                    <label style="color:#999; font-size:11px; cursor:pointer; user-select:none;">
                        <input type="checkbox" id="switch-cumulative" checked style="vertical-align:middle; margin:0; accent-color:#555;"> Cumulative
                    </label>
                    <label style="color:#999; font-size:11px; cursor:pointer; user-select:none;">
                        <input type="checkbox" id="switch-percent" checked style="vertical-align:middle; margin:0; accent-color:#555;"> Percent
                    </label>
                </div>
            </div>
            <canvas id="tier-chart"></canvas>
        </div>

        <div class="results-table" id="results-table"></div>

        
        <div id="score-tooltip" class="score-tooltip" style="display:none; position:fixed; z-index:9999; padding:4px 10px; border-radius:4px; font-size:11px; white-space:nowrap; pointer-events:none; background:#1a1a1a; border:1px solid #555; color:#ddd; line-height:1.4;"></div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
        <script src="scripts/countryData.js"></script>
        <script src="power/js/dynamicPower.js"></script>
        <script src="power/js/populatetable.js" type="module"></script>
        <script defer="" src="power/js/switch.js"></script>
        
</body></html>
