<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open Slidysim Leaderboard Archive</title>
  <link rel="icon" href="images/egg.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- The standalone Archive page has been merged into the Live LB page.
       The LB page now has a date slider (toggle via the "Live" / date button
       in the nav, next to the Exe/Web/LM toggles) that lets you time-travel
       through any Exe / Web / LM archive. Redirect there. -->
  <meta http-equiv="refresh" content="0; url=/lb">
  <style>
    body { background: #1a1a1a; color: #ccc; font-family: monospace; text-align: center; padding: 40px; }
    a { color: #00ffff; }
  </style>
</head>
<body>
  <p>Archive page has been merged into the <a href="/lb">Live LB page</a>.</p>
  <p>Redirecting&hellip; if nothing happens, <a href="/lb">click here</a>.</p>
  <script>
    // Hard redirect in case meta refresh is blocked.
    (function () {
      var target = '/lb';
      try {
        var url = new URL(window.location.href);
        // Preserve any hash (e.g. archive date) so deep links still land somewhere useful.
        if (url.hash) target += url.hash;
      } catch (e) {}
      window.location.replace(target);
    })();
  </script>
</body>
</html>
